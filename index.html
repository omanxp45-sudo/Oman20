function requireLogin(action){
  const user = auth().currentUser;

  if(user){
    window.location.href = "upload.html";
  } else {
    showLoginModal();
  }
}
  <button class="bn-btn" onclick="requireLogin('upload.html')"><i class="bi bi-plus-square"></i><span id="bn-post">نشر</span></button>
