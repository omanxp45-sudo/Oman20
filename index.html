<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oman Web Search</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
padding:30px;
}

h2{
color:#333;
}

input{
width:70%;
padding:12px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:12px 15px;
font-size:18px;
border:none;
border-radius:8px;
margin:5px;
cursor:pointer;
}

#searchBtn{background:#4CAF50;color:white;}
#micBtn{background:ButtonFacecolor:white;}
#favBtn{background:rgb(24, 9, 241);color:white;}

#results{
margin-top:25px;
background:white;
padding:20px;
border-radius:10px;
}

#favorites{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
}

.favoriteItem{
cursor:pointer;
color:#0066cc;
margin:5px;
}

</style>
</head>

<body onload="window.location.href='index.html.html'">


<h2>Oman Web Search 🔎</h2>

<input id="searchBox" placeholder="Type or speak your search">
<button id="micBtn">🎤</button>

<br><br>

<button id="searchBtn">Search</button>
<button id="favBtn">⭐ Favorite</button>

<div id="results"></div>

<div id="favorites">
<h3>Favorites</h3>
<div id="favList"></div>
</div>

<script>

const searchBox = document.getElementById("searchBox");
const results = document.getElementById("results");
const favList = document.getElementById("favList");

document.getElementById("searchBtn").onclick = search;
document.getElementById("favBtn").onclick = addFavorite;

function search(){

let query = searchBox.value;

if(query==="") return;

results.innerHTML =
"<p>Searching for: <b>"+query+"</b></p>"+
"<a href='https://www.google.com/search?q="+encodeURIComponent(query)+"' target='_blank'>Open Google Results</a>";

}

function addFavorite(){

let query = searchBox.value;

if(query==="") return;

let favorites = JSON.parse(localStorage.getItem("favorites")||"[]");

favorites.push(query);

localStorage.setItem("favorites",JSON.stringify(favorites));

loadFavorites();

}

function loadFavorites(){

favList.innerHTML="";

let favorites = JSON.parse(localStorage.getItem("favorites")||"[]");

favorites.forEach(f=>{

let div=document.createElement("div");

div.className="favoriteItem";

div.innerText=f;

div.onclick=()=>{

searchBox.value=f;

search();

};

favList.appendChild(div);

});

}

loadFavorites();


/* Microphone */

if ('webkitSpeechRecognition' in window) {

const recognition = new webkitSpeechRecognition();

recognition.lang = navigator.language;

recognition.onresult = function(event){

searchBox.value = event.results[0][0].transcript;

};

document.getElementById("micBtn").onclick=function(){

recognition.start();

};

}

</script>

</body>
</html>
